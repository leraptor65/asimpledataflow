version: '3.8'

services:
  app:
    image: leraptor65/asimpledataflow:latest
    ports:
      - "3000:3000"
    volumes:
      - ./notes:/app/data
    environment:
      - DB_HOST=postgres
      - DB_USER=appuser
      - DB_PASSWORD=secretpassword
      - DB_NAME=notesdb
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: notesdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
