version: '3.8'

services:
  backend:
    image: leraptor65/asimpledataflow:latest-backend
    ports:
      - "8080:8080"
    volumes:
      - asdf-data:/app/data
    environment:
      - DB_HOST=postgres
      - DB_USER=appuser
      - DB_PASSWORD=secretpassword
      - DB_NAME=notesdb
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    image: leraptor65/asimpledataflow:latest-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: notesdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  asdf-data:
