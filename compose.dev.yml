services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./notes:/app/data
      - ~/.config/gh:/root/.config/gh:ro    # Mount gh CLI auth (run 'gh auth login' on host first)
      - ~/.gitconfig:/root/.gitconfig:ro    # Mount git config (for commit author info)
    environment:
      - DB_HOST=postgres
      - DB_USER=appuser
      - DB_PASSWORD=secretpassword
      - DB_NAME=notesdb
      # - GITHUB_REPO=https://github.com/username/repo.git # Optional: GitHub repository URL to sync notes
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: notesdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
